<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WasmWine PoC</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            background: #121212; 
            color: #00ff00; 
            font-family: monospace; 
            padding: 20px; 
            margin: 0; 
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            font-size: 1.5rem;
        }
        #console { 
            background: #000; 
            border: 1px solid #333; 
            height: 350px; 
            padding: 15px; 
            overflow-y: auto; 
            white-space: pre-wrap; 
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.4;
        }
        button { 
            background: #00ff00; 
            color: #000; 
            border: none; 
            padding: 18px 30px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            width: 100%; 
            border-radius: 5px;
            transition: background 0.2s;
        }
        button:disabled {
            background: #333;
            color: #777;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <h2>🚀 WasmWine 超高速同期テスト基盤</h2>
    <div id="console">Initializing...</div>
    <button id="startButton" disabled>エミュレータ実行（JIT+OPFS同期）</button>

    <script>
        const logDiv = document.getElementById("console");
        function log(msg) { 
            logDiv.innerText += `\n${msg}`; 
            logDiv.scrollTop = logDiv.scrollHeight; 
        }

        // 1. Service Workerの自己偽装登録
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js").then((reg) => {
                log("ℹ️ Service Worker 登録完了");
                reg.addEventListener("updatefound", () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener("statechange", () => {
                        if (newWorker.state === "activated") {
                            log("🔄 偽装ヘッダー有効化のため自動リロードします...");
                            window.location.reload();
                        }
                    });
                });
            }).catch(err => {
                log("❌ Service Worker 登録失敗: " + err);
            });
        }

        // 2. 起動時の環境チェック（ここではまだ永続化要求はしない）
        window.addEventListener("load", async () => {
            if (typeof SharedArrayBuffer === "undefined") {
                log("❌ エラー: SharedArrayBuffer が無効です！ヘッダーの自己偽装、またはvercel.jsonの設定が反映されていません。");
                return;
            }
            log("✅ SharedArrayBuffer 解放成功！");

            // 現在のクォータ（利用可能容量）の目安だけ事前確認
            if (navigator.storage && navigator.storage.estimate) {
                const estimate = await navigator.storage.estimate();
                const availableGB = (estimate.quota / (1024 * 1024 * 1024)).toFixed(2);
                log(`📊 現在のブラウザ推定上限: 約 ${availableGB} GB`);
            }

            document.getElementById("startButton").disabled = false;
        });

        // 3. 実行トリガー（ユーザーのアクション起点）
        document.getElementById("startButton").addEventListener("click", async () => {
            log("\n🏁 エミュレータスレッドの起動シークエンス開始...");
            
            // 🔥 【対策】ユーザーがボタンをクリックしたこの瞬間にストレージの永続化を要求
            if (navigator.storage && navigator.storage.persist) {
                log("🔒 ストレージの永続化要求（persist）を送信中...");
                const granted = await navigator.storage.persist();
                
                if (granted) {
                    log("🎯 🔒 ストレージの永続化：承認成功！（OSによる自動削除から保護されました）");
                } else {
                    log("⚠️ 🔒 ストレージの永続化：拒否（PWAとしてホーム画面から起動するか、サイトとのインタラクションを増やしてください。※OPFS自体は制限付きで動作します）");
                }
            }

            // 共有メモリとWasmTableの生成
            const sharedBuffer = new SharedArrayBuffer(1024);
            const wasmTable = new WebAssembly.Table({ initial: 100, element: "anyfunc" });

            // 各種 Worker の生成
            log("⚙️ メインWorker と JITWorker をスピンアップします...");
            const mainWorker = new Worker("main-worker.js");
            const jitWorker = new Worker("jit-worker.js");

            // メモリ空間とテーブルの共有
            mainWorker.postMessage({ sharedBuffer, wasmTable });
            jitWorker.postMessage({ sharedBuffer, wasmTable });
        });
    </script>
</body>
</html>
